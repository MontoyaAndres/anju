name = "anju-api"
main = "dist/index.js"
compatibility_date = "2025-11-17"

compatibility_flags = ["nodejs_compat", "nodejs_compat_populate_process_env"]

[limits]
cpu_ms = 30000

[build]
command = "npm run build"

[env.development]
name = "anju-api-development"
routes = [
  { pattern = "development-api.vocesqueabrazan.com", custom_domain = true }
]
[env.development.observability]
enabled = true
[env.development.observability.logs]
enabled = true
invocation_logs = true
[env.development.observability.traces]
enabled = false
[env.development.vars]
NODE_ENV = "production"
RESOURCE_HANDLER_PORT="8082"
NEXT_PUBLIC_API_URL = "https://development-api.vocesqueabrazan.com"
NEXT_PUBLIC_MCP_URL = "https://development-mcp.vocesqueabrazan.com"
NEXT_PUBLIC_WEB_URL = "https://development-app.vocesqueabrazan.com"
NEXT_PUBLIC_DOMAIN = "vocesqueabrazan.com"
[[env.development.hyperdrive]]
binding = "HYPERDRIVE"
id = "20b38b96e12a4f45ac111fb7d8161edf"
[[env.development.r2_buckets]]
binding = "STORAGE_BUCKET"
bucket_name = "anju-storage-development"
[[env.development.queues.producers]]
binding = "INDEX_QUEUE"
queue = "anju-index-development"
[[env.development.queues.consumers]]
queue = "anju-index-development"
max_batch_size = 1
max_batch_timeout = 5
max_concurrency = 5
max_retries = 3
dead_letter_queue = "anju-index-dlq-development"
[[env.development.containers]]
class_name = "ResourceHandler"
image = "../resource-handler/Dockerfile"
image_build_context = "../.."
max_instances = 3
instance_type = "standard-1"
[[env.development.durable_objects.bindings]]
name = "RESOURCE_HANDLER"
class_name = "ResourceHandler"
[[env.development.migrations]]
tag = "v1"
new_sqlite_classes = ["ResourceHandler"]

[env.production]
name = "anju-api-production"
[env.production.observability]
enabled = true
[env.production.observability.logs]
enabled = true
invocation_logs = true
[env.production.observability.traces]
enabled = false
[env.production.vars]
NODE_ENV = "production"
RESOURCE_HANDLER_PORT="8082"
NEXT_PUBLIC_API_URL = "https://api.anju.ai"
NEXT_PUBLIC_MCP_URL = "https://mcp.anju.ai"
NEXT_PUBLIC_WEB_URL = "https://app.anju.ai"
NEXT_PUBLIC_DOMAIN = "anju.ai"
[[env.production.hyperdrive]]
binding = "HYPERDRIVE"
id = "<YOUR_HYPERDRIVE_ID>"
[[env.production.r2_buckets]]
binding = "STORAGE_BUCKET"
bucket_name = "anju-storage-production"
[[env.production.queues.producers]]
binding = "INDEX_QUEUE"
queue = "anju-index-production"
[[env.production.queues.consumers]]
queue = "anju-index-production"
max_batch_size = 1
max_batch_timeout = 5
max_concurrency = 5
max_retries = 3
dead_letter_queue = "anju-index-dlq-production"
[[env.production.containers]]
class_name = "ResourceHandler"
image = "../resource-handler/Dockerfile"
image_build_context = "../.."
max_instances = 3
instance_type = "standard-1"
[[env.production.durable_objects.bindings]]
name = "RESOURCE_HANDLER"
class_name = "ResourceHandler"
[[env.production.migrations]]
tag = "v1"
new_sqlite_classes = ["ResourceHandler"]
